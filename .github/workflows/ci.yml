name: CI

on:
  push:
    branches: [main]
    paths:
      - 'nix/**'
      - 'config/**'
      - 'install/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'nix/**'
      - 'config/**'
      - 'install/**'
      - 'tests/**'
      - '.github/workflows/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          find . -name "*.sh" -type f | xargs shellcheck

      - name: Install secretlint
        run: npm install -g secretlint @secretlint/secretlint-rule-preset-recommend

      - name: Run secretlint
        run: secretlint "**/*"

  nix-flake-check:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: Check nixfmt formatting
        run: |
          find nix -name "*.nix" -type f | \
            xargs nix run nixpkgs#nixfmt -- --check
      - run: nix flake check ./nix

  docker-test:
    name: Docker Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build and test in Docker
        run: |
          docker build -t dotfiles-test -f tests/Dockerfile .

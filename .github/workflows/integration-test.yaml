name: Integration Test

on:
  push:
    branches: [main]
    paths:
      - '**/*.nix'
      - 'flake.lock'
      - 'config/**'
      - 'install/**'
      - 'modules/neovim/check-keymaps.lua'
      - '.github/workflows/integration-test.yaml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.nix'
      - 'flake.lock'
      - 'config/**'
      - 'install/**'
      - 'modules/neovim/check-keymaps.lua'
      - '.github/workflows/integration-test.yaml'

jobs:
  integration-test:
    name: Integration Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: rito528-dotfiles
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build home-manager configuration
        env:
          CI: true
        run: |
          nix run nixpkgs#home-manager -- build --flake .#testuser

      - name: Test neovim headless startup
        run: |
          nixvim=$(nix-store -q --references "$(readlink result/home-path)" | grep nixvim)
          cache_dir=$(mktemp -d)
          mkdir -p "$cache_dir/nvim"
          XDG_CONFIG_HOME="$(readlink -f result/home-files/.config)" \
            XDG_CACHE_HOME="$cache_dir" \
            XDG_DATA_HOME="$(mktemp -d)" \
            "$nixvim/bin/nvim" --headless -c "quitall"

      - name: Check duplicate keymaps
        run: |
          nixvim=$(nix-store -q --references "$(readlink result/home-path)" | grep nixvim)
          cache_dir=$(mktemp -d)
          mkdir -p "$cache_dir/nvim"
          XDG_CONFIG_HOME="$(readlink -f result/home-files/.config)" \
            XDG_CACHE_HOME="$cache_dir" \
            XDG_DATA_HOME="$(mktemp -d)" \
            "$nixvim/bin/nvim" --headless \
              -S modules/neovim/check-keymaps.lua

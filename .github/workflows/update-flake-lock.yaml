name: Update flake.lock

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 UTC 0:00
  workflow_dispatch:

jobs:
  update-flake-lock:
    name: Update flake.lock
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - parallel:
          - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
            id: app-token
            with:
              app-id: ${{ vars.APP_ID }}
              private-key: ${{ secrets.APP_PRIVATE_KEY }}

          - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - parallel:
          - name: Update root flake.lock
            run: nix flake update

          - name: Update template flake.locks
            run: |
              for dir in templates/*/; do
                (cd "$dir" && nix flake update)
              done

      - name: Create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add flake.lock
          find templates -maxdepth 2 -name "flake.lock" -exec git add {} \;

          if git diff --staged --quiet; then
            echo "No changes detected"
            exit 0
          fi

          branch="update-flake-lock"
          git checkout -B "$branch"
          git commit -m "deps: update flake.lock"
          git push origin "$branch" --force

          gh pr create \
            --title "deps: update flake.lock" \
            --body "Daily automated flake.lock updates for root flake and templates." \
            --label "dependencies" \
            --base main \
            --head "$branch" 2>/dev/null || echo "PR already exists, branch updated"

          gh pr merge "$branch" --auto --squash --delete-branch

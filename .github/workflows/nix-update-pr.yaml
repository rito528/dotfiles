name: Update nix hashes on Renovate PRs

on:
  pull_request:
    branches: [main]
    paths:
      - 'nix/modules/npm/packages/*.nix'
      - 'nix/modules/packages/*.nix'

jobs:
  update-hashes:
    # Renovate が開いた PR のみ対象・GitHub App による push は無限ループ防止のためスキップ
    if: startsWith(github.head_ref, 'renovate/') && github.actor != 'rito528-dotfiles-bot[bot]'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Update hashes for changed nix files
        run: |
          changed=$(git diff --name-only origin/main HEAD -- 'nix/modules/npm/packages/*.nix' 'nix/modules/packages/*.nix')
          cd nix
          for f in $changed; do
            pkg=$(basename "$f" .nix)
            echo "Updating hashes for ${pkg}..."
            nix run nixpkgs#nix-update -- --version=skip --flake "${pkg}"
          done

      - name: Commit updated hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nix/modules/npm/packages/ nix/modules/packages/
          git diff --staged --quiet || git commit -m "chore: update nix hashes for renovate bump"
          git push

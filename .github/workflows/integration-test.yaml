name: Integration Test

on:
  workflow_call:

jobs:
  integration-test:
    name: Integration Test
    runs-on: ubuntu-24.04
    steps:
      - parallel:
          - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

          - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
            with:
              extra_nix_config: |
                accept-flake-config = true

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: rito528-dotfiles
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build home-manager configuration
        env:
          CI: true
        run: |
          nix run nixpkgs#home-manager -- build --flake .#testuser

      - parallel:
          - name: Test neovim headless startup
            run: |
              nixvim=$(nix-store -q --references "$(readlink result/home-path)" | grep nixvim)
              cache_dir=$(mktemp -d)
              mkdir -p "$cache_dir/nvim"
              XDG_CONFIG_HOME="$(readlink -f result/home-files/.config)" \
                XDG_CACHE_HOME="$cache_dir" \
                XDG_DATA_HOME="$(mktemp -d)" \
                "$nixvim/bin/nvim" --headless -c "quitall"

          - name: Check duplicate keymaps
            run: |
              nixvim=$(nix-store -q --references "$(readlink result/home-path)" | grep nixvim)
              cache_dir=$(mktemp -d)
              mkdir -p "$cache_dir/nvim"
              XDG_CONFIG_HOME="$(readlink -f result/home-files/.config)" \
                XDG_CACHE_HOME="$cache_dir" \
                XDG_DATA_HOME="$(mktemp -d)" \
                "$nixvim/bin/nvim" --headless \
                  -S modules/neovim/check-keymaps.lua

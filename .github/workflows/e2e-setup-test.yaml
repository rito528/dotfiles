name: E2E Setup Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-setup-test:
    name: E2E Setup Test
    runs-on: ubuntu-24.04
    env:
      CI: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31

      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: rito528-dotfiles
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Create testuser
        run: |
          sudo apt-get install -y zsh
          sudo useradd -m -s /bin/zsh testuser
          echo "testuser ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/testuser
          sudo mkdir -p /nix/var/nix/profiles/per-user/testuser
          sudo chown testuser:testuser /nix/var/nix/profiles/per-user/testuser
          # Allow testuser to use nix
          echo "trusted-users = root runner testuser" | sudo tee -a /etc/nix/nix.conf
          sudo systemctl restart nix-daemon || true

      - name: Copy repo to testuser home
        run: |
          sudo cp -r "$GITHUB_WORKSPACE" /home/testuser/dotfiles
          sudo chown -R testuser:testuser /home/testuser/dotfiles

      - name: Run setup.sh as testuser
        run: sudo -u testuser env HOME=/home/testuser XDG_CONFIG_HOME=/home/testuser/.config bash -c "cd /home/testuser/dotfiles && CI=true ./setup.sh"

      - name: Verify managed packages
        run: |
          sudo -u testuser env HOME=/home/testuser XDG_CONFIG_HOME=/home/testuser/.config /home/testuser/.nix-profile/bin/jq --version
          sudo -u testuser env HOME=/home/testuser XDG_CONFIG_HOME=/home/testuser/.config /home/testuser/.nix-profile/bin/rg --version
          sudo -u testuser env HOME=/home/testuser XDG_CONFIG_HOME=/home/testuser/.config /home/testuser/.nix-profile/bin/gh --version
          sudo -u testuser env HOME=/home/testuser XDG_CONFIG_HOME=/home/testuser/.config /home/testuser/.nix-profile/bin/starship --version

      - name: Verify managed config files
        run: |
          test -f /home/testuser/.zshrc
          test -f /home/testuser/.zprofile
          test -f /home/testuser/.config/git/config
          test -f /home/testuser/.config/git/hooks/pre-commit

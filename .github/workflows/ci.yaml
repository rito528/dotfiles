name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      ci: ${{ steps.changes.outputs.ci }}
      devshell: ${{ steps.changes.outputs.devshell }}
      docs: ${{ steps.changes.outputs.docs }}
      integration: ${{ steps.changes.outputs.integration }}
      nix: ${{ steps.changes.outputs.nix }}
      shell: ${{ steps.changes.outputs.shell }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          base="$BASE_SHA"
          head="$HEAD_SHA"

          if [ "$EVENT_NAME" = "push" ] && [[ "$base" =~ ^0+$ ]]; then
            base="${head}^"
          fi

          changed_files=$(git diff --name-only "$base" "$head")

          ci=false
          devshell=false
          docs=false
          integration=false
          nix=false
          shell=false

          while IFS= read -r file; do
            [ -n "$file" ] || continue

            case "$file" in
              .github/workflows/*)
                ci=true
                ;;
            esac

            case "$file" in
              *.nix|flake.lock)
                nix=true
                integration=true
                ;;
            esac

            case "$file" in
              config/*|install/*|modules/neovim/check-keymaps.lua)
                integration=true
                ;;
            esac

            case "$file" in
              templates/*)
                devshell=true
                ;;
            esac

            case "$file" in
              docs-site/*)
                docs=true
                ;;
            esac

            case "$file" in
              *.sh|install/*|config/*)
                shell=true
                ;;
            esac
          done <<< "$changed_files"

          {
            echo "ci=$ci"
            echo "devshell=$devshell"
            echo "docs=$docs"
            echo "integration=$integration"
            echo "nix=$nix"
            echo "shell=$shell"
          } >> "$GITHUB_OUTPUT"

  editorconfig:
    name: EditorConfig
    uses: ./.github/workflows/editorconfig.yaml

  lint:
    name: Lint
    needs: changes
    uses: ./.github/workflows/lint.yaml
    with:
      run-shellcheck: ${{ needs.changes.outputs.ci == 'true' || needs.changes.outputs.shell == 'true' }}

  nix:
    name: Nix
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.nix == 'true'
    uses: ./.github/workflows/nix.yaml

  integration-test:
    name: Integration Test
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.integration == 'true'
    uses: ./.github/workflows/integration-test.yaml
    secrets: inherit

  devshell:
    name: Dev Shell
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.devshell == 'true'
    uses: ./.github/workflows/devshell.yaml
    secrets: inherit

  docs:
    name: Docs
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.docs == 'true'
    uses: ./.github/workflows/docs.yaml

  ci-gate:
    name: CI Gate
    needs:
      - changes
      - editorconfig
      - lint
      - nix
      - integration-test
      - devshell
      - docs
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Check required CI jobs
        env:
          RESULTS: ${{ toJson(needs.*.result) }}
        run: |
          set -euo pipefail

          echo "$RESULTS" | jq -e 'all(.[]; . == "success" or . == "skipped")'

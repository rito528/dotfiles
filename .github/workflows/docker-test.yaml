name: Docker Integration Test

on:
  push:
    branches: [main]
    paths:
      - 'nix/**'
      - 'config/**'
      - 'install/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'nix/**'
      - 'config/**'
      - 'install/**'
      - 'tests/**'
      - '.github/workflows/**'

jobs:
  docker-test:
    name: Docker Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and test in Docker
        run: |
          docker build -t dotfiles-test -f tests/Dockerfile .
